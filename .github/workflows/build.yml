name: Build JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jadx-mcp-server
          path: target/jadx-mcp-server-*.jar
          if-no-files-found: error

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract latest changelog
        run: sed -n '/^## /{p; :a; n; /^## /q; p; ba}' CHANGELOG.md > /tmp/release_notes.md

      - name: Create latest release
        run: |
          gh release create latest target/jadx-mcp-server-*.jar \
            --title "Latest Build" \
            --notes-file /tmp/release_notes.md \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
